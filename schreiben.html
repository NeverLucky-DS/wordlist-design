<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Essay · Schreiben</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/schreiben.css?v=3">
</head>
<body>

  <!-- watercolor mountains, pinned to the bottom-right of the viewport -->
  <img class="bg-mountains" src="images/mountains-corner.png" alt="" aria-hidden="true">
  <!-- quiet watercolor accent, top-left corner -->
  <div class="bg-corner" aria-hidden="true"></div>

  <!-- ===================== Top bar ===================== -->
  <header class="topbar">
    <a class="brand" href="index.html"><span class="b1">Deutsch</span><span class="b2">Essay</span></a>

    <nav class="nav">
      <a href="#">Dashboard</a>
      <a href="#" class="active">Schreiben</a>
      <div class="nav-drop">
        <button type="button">Lernen
          <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="nav-menu">
          <a href="index.html">Wörterbuch</a>
          <a href="#">Übung</a>
          <a href="#">Grammatik</a>
        </div>
      </div>
      <a href="#">Verlauf</a>
      <a href="pipeline.html">Pipeline</a>
    </nav>

    <div class="top-right">
      <!-- pomodoro lives up here as a quiet pill; click = start/pause, ⟲ appears on hover -->
      <div class="pomo" id="pomo">
        <button class="pomo-main" id="pomoMain" type="button" aria-label="Pomodoro starten/pausieren">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 2h6"/></svg>
          <span id="pomoTime">25:00</span>
        </button>
        <button class="pomo-reset" id="pomoReset" type="button" aria-label="Zurücksetzen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="Theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <div class="avatar">D</div>
    </div>
  </header>

  <!-- ===================== Page grid ===================== -->
  <div class="layout">

    <!-- ---------- Left rail: essay map ---------- -->
    <aside class="rail-left">
      <div class="new-essay-row">
        <button class="btn-new" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Neues Essay</button>
        <button class="btn-icon" type="button" aria-label="Essays öffnen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></button>
      </div>

      <div class="rail-cap">Essay Map</div>
      <div class="roadmap" id="roadmap"></div>

      <div class="rail-block">
        <div class="rail-cap">Fortschritt</div>
        <div class="progress-cap"><b id="progTotal">0</b><span class="of"> / 250 Wörter</span></div>
        <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      </div>

      <div class="rail-quote">Ein Schriftsteller ist ein Mensch, dem das Schreiben schwerer fällt als allen anderen Leuten.
        <span class="au">— Thomas Mann</span></div>

      <div class="niveau-box">
        <div class="dd" id="ddNiveau">
          <button class="dd-btn" type="button"><span class="k">Niveau</span><span class="lbl" id="niveauLbl">B1</span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
          <div class="dd-menu">
            <button class="sel">B1</button><button>B2</button><button>C1</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- ---------- Center: the sheet ---------- -->
    <main class="sheet">
      <div class="sheet-scroll">
        <div class="editable" id="editable" contenteditable="true" spellcheck="false"></div>
        <div class="stage-tip" id="stageTip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 21h4"/><path d="M12 3a6 6 0 0 0-3.5 10.9c.7.5 1 1.3 1 2.1h5c0-.8.3-1.6 1-2.1A6 6 0 0 0 12 3z"/></svg>
          <p><b id="tipLead"></b> <span id="tipText"></span></p>
        </div>
      </div>

      <div class="sheet-foot">
        <span class="wc" id="wordCount">0 Wörter</span>
        <button class="btn-analyze" id="btnAnalyze" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.6 5.1L19 8.7l-4.2 3.1L16.4 17 12 13.9 7.6 17l1.6-5.2L5 8.7l5.4-.6z"/></svg>
          Analysieren
        </button>
        <span class="saved"><span class="dot"></span> Automatisch gespeichert</span>
      </div>
    </main>

    <!-- ---------- Right rail: two tool launchers ---------- -->
    <aside class="rail-right" id="tools">

      <section class="tool-card" data-tool="hilfen">
        <button class="tool-head" type="button">
          <span class="tool-ico">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 8c0 3-1.5 5-4 5v3c4.5 0 7-3 7-8V5H6v3h4zm11 0c0 3-1.5 5-4 5v3c4.5 0 7-3 7-8V5h-7v3h4z" transform="scale(.82) translate(2.6 2.6)"/></svg>
          </span>
          <span class="tool-txt"><b>Schreibhilfen</b><i>Formulierungen &amp; Beispiele</i></span>
          <svg class="tool-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </section>

      <section class="tool-card" data-tool="woerterbuch">
        <button class="tool-head" type="button">
          <span class="tool-ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5" stroke-linecap="round"/></svg>
          </span>
          <span class="tool-txt"><b>Wörterbuch</b><i>Wörter &amp; Übersetzungen</i></span>
          <svg class="tool-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </section>

    </aside>
  </div>

  <!-- ===================== Slide-out tool drawer ===================== -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <header class="drawer-head">
      <span class="drawer-ico" id="drawerIco"></span>
      <div class="drawer-titles"><b id="drawerTitle"></b><i id="drawerSub"></i></div>
      <button class="drawer-close" id="drawerClose" type="button" aria-label="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </header>
    <div class="drawer-body" id="drawerBody"></div>
    <footer class="drawer-foot"><div class="pager" id="drawerPager" hidden></div></footer>
  </aside>

  <!-- ===================== Word-card popover ===================== -->
  <div class="wc-overlay" id="wcOverlay"></div>
  <article id="wordCard"></article>

  <!-- live dashed connector: card word ↔ list word -->
  <svg class="link-line" id="linkLine" aria-hidden="true" hidden>
    <path id="linkPath" d=""/>
    <circle id="linkAnchor" class="ll-anchor" r="4.5"/>
    <circle id="linkDot" class="ll-dot" r="4"/>
  </svg>

  <script src="js/schreiben.js?v=3"></script>
</body>
</html>
