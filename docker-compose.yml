services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wordlist
      POSTGRES_USER: wordlist
      POSTGRES_PASSWORD: wordlist
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordlist -d wordlist"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://wordlist:wordlist@postgres:5432/wordlist
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-large-latest}
      GROK_API_KEY: ${GROK_API_KEY:-}
      CORS_ORIGINS: "http://localhost:8753,http://127.0.0.1:8753,http://localhost,http://127.0.0.1"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── nginx — static frontend ──────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "8753:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./editor.html:/usr/share/nginx/html/editor.html:ro
      - ./word-card.html:/usr/share/nginx/html/word-card.html:ro
      - ./pipeline.html:/usr/share/nginx/html/pipeline.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./worte:/usr/share/nginx/html/worte:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
