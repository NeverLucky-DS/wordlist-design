services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wordlist
      POSTGRES_USER: wordlist
      POSTGRES_PASSWORD: wordlist
    ports:
      # Только на localhost — нужно, чтобы read-only-postgres skill (Claude Code)
      # мог подключиться с хоста. Dev-only, не публиковать наружу.
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordlist -d wordlist"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Secrets (MISTRAL_API_KEY, GROK_API_KEY, MISTRAL_MODEL) live in ONE place:
    # backend/.env. `required: false` keeps a fresh clone bootable before setup.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Docker-specific overrides — these win over values from backend/.env.
      DATABASE_URL: postgresql+asyncpg://wordlist:wordlist@postgres:5432/wordlist
      CORS_ORIGINS: "http://localhost:8753,http://127.0.0.1:8753,http://localhost,http://127.0.0.1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # slim image has no curl — probe /health with stdlib urllib instead.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s   # room for `alembic upgrade head` + seeding on first boot
    restart: unless-stopped

  # ── nginx — static frontend ──────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "8753:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./schreiben.html:/usr/share/nginx/html/schreiben.html:ro
      - ./pipeline.html:/usr/share/nginx/html/pipeline.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./worte:/usr/share/nginx/html/worte:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
