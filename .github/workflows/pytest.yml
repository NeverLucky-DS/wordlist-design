name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (from uv.lock)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/ci-test.db
          MISTRAL_API_KEY: ""
          GROK_API_KEY: ""
          CORS_ORIGINS: http://127.0.0.1:8753
