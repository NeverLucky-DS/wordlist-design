<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Essay · Wörterbuch</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg-cool);color:var(--ink);font-family:var(--font-sans);overflow-x:hidden;position:relative;-webkit-font-smoothing:antialiased}

  /* fixed left decorative watercolor column (real PNG) */
  .bg-column{position:fixed;left:-75px;top:0;bottom:0;width:360px;z-index:0;pointer-events:none;
    background:url('../../assets/images/abstract-watercolor-column.png') no-repeat -135px center;
    background-size:auto 106%;opacity:.7;
    -webkit-mask:linear-gradient(to right,#000 0,#000 34%,transparent 78%);
            mask:linear-gradient(to right,#000 0,#000 34%,transparent 78%)}
  .side-label{position:fixed;left:30px;top:240px;z-index:4;writing-mode:vertical-rl;transform:rotate(180deg);
    letter-spacing:6px;font-size:10px;color:var(--muted-2);font-weight:600}

  /* fixed right rail */
  .rail{position:fixed;top:0;right:0;height:100vh;width:212px;z-index:3;border-left:1px solid var(--hair);
    background:var(--bg-cool);display:flex;flex-direction:column;justify-content:center;gap:22px;padding:0 26px}

  /* word row hover draw-in (the .jsx renders base state; this adds the hover reveal) */
  .de-wordrow{transition:none}
  .de-wordrow:hover{background:transparent}
  .de-wordrow:hover .de-wordrow-wash{opacity:.92!important;
    -webkit-mask-image:linear-gradient(90deg,#000 0,#000 70%,rgba(0,0,0,.4) 82%,transparent 92%)!important;
            mask-image:linear-gradient(90deg,#000 0,#000 70%,rgba(0,0,0,.4) 82%,transparent 92%)!important}

  @media (max-width:1240px){
    main{padding:18px 60px 90px 64px!important}
    .rail{position:static;width:auto;height:auto;border-left:0;border-top:1px solid var(--hair);
      flex-direction:row;flex-wrap:wrap;justify-content:space-around;padding:30px 60px}
    .side-label{display:none}
  }
</style>
<link id="gfont-Poppins" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap">
</head>
<body style="font-family: Poppins">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Woerterbuch.jsx"></script>
<script type="text/babel">
  const Woerterbuch = window.Woerterbuch;
  ReactDOM.createRoot(document.getElementById('root')).render(<Woerterbuch/>);
</script>
</body>
</html>
