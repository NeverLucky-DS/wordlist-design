<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale — 4px base" subtitle="Generous, paper-like rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:26px 28px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--accent-bg);border:1px solid var(--accent-ln);border-radius:4px;width:26px}
  .v{font-size:10px;color:var(--ink-soft);font-variant-numeric:tabular-nums;font-weight:600}
  .k{font-size:9px;color:var(--muted)}
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="k">2</div></div>
    <div class="cell"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="k">3</div></div>
    <div class="cell"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="k">4</div></div>
    <div class="cell"><div class="bar" style="height:20px"></div><div class="v">20</div><div class="k">5</div></div>
    <div class="cell"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="k">6</div></div>
    <div class="cell"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="k">7</div></div>
    <div class="cell"><div class="bar" style="height:40px"></div><div class="v">40</div><div class="k">8</div></div>
    <div class="cell"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="k">9</div></div>
    <div class="cell"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="k">10</div></div>
  </div>
</body>
</html>
