<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces — warm ivory paper" subtitle="The world is paper; cards lift to white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px 28px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{border-radius:12px;border:1px solid var(--line);overflow:hidden}
  .chip{height:64px}
  .meta{padding:8px 10px}
  .nm{font-size:11px;font-weight:600;color:var(--ink)}
  .hex{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="nm">Page</div><div class="hex">#FAF8F4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-2)"></div><div class="meta"><div class="nm">Sunk</div><div class="hex">#F3F0E9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="meta"><div class="nm">Cream</div><div class="hex">#FBFAF6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="meta"><div class="nm">Card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--graphite)"></div><div class="meta"><div class="nm">Dark</div><div class="hex">#33312C</div></div></div>
  </div>
</body>
</html>
