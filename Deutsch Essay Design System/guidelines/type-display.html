<!-- @dsCard group="Type" viewport="700x260" name="Display serif — Cormorant Garamond" subtitle="The editorial voice: hero titles & every German word" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);padding:28px 32px}
  .row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--line-soft);padding:10px 0}
  .row:last-child{border-bottom:0}
  .spec{font-size:var(--text-micro);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);width:108px;flex:none;font-weight:600}
  .serif{font-family:var(--font-serif);color:var(--ink);line-height:1;font-weight:600}
</style>
</head>
<body>
  <div class="row"><span class="spec">Display · 76</span><span class="serif" style="font-size:64px">Wörterbuch</span></div>
  <div class="row"><span class="spec">Title · 56</span><span class="serif" style="font-size:48px">Argument Eins</span></div>
  <div class="row"><span class="spec">Word · 26 / 500</span><span class="serif" style="font-size:30px;font-weight:500">die Abhängigkeit</span></div>
  <div class="row"><span class="spec">Italic · pull</span><span class="serif" style="font-size:26px;font-weight:500;font-style:italic;color:var(--ink-soft)">Die Grenzen meiner Sprache.</span></div>
</body>
</html>
