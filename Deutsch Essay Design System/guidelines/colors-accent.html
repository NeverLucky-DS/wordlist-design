<!-- @dsCard group="Colors" viewport="700x210" name="The one accent — muted plum" subtitle="Live & interactive. Used with discipline, never decoration" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px 28px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px}
  .sw{border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  .chip{height:48px}
  .meta{padding:7px 9px;background:var(--card)}
  .nm{font-size:10.5px;font-weight:600;color:var(--ink)}
  .hex{font-size:9.5px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}
  .demo{display:flex;align-items:center;gap:12px}
  .btn{display:inline-flex;align-items:center;height:42px;padding:0 22px;border:0;border-radius:14px;color:#fff;font-size:14px;font-weight:600;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:var(--shadow-accent)}
  .soft{display:inline-flex;align-items:center;height:42px;padding:0 18px;border-radius:11px;background:var(--accent-bg);color:var(--accent-dk);font-size:13.5px;font-weight:600;border:1px solid var(--accent-ln)}
  .line{flex:1;height:2px;border-radius:2px;background:repeating-linear-gradient(90deg,var(--orange) 0 6px,transparent 6px 13px)}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="nm">accent</div><div class="hex">#6C6580</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-2)"></div><div class="meta"><div class="nm">accent-2</div><div class="hex">#8A8299</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-dk)"></div><div class="meta"><div class="nm">accent-dk</div><div class="hex">#524C63</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-ln)"></div><div class="meta"><div class="nm">accent-ln</div><div class="hex">#D0CBD9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-bg)"></div><div class="meta"><div class="nm">accent-bg</div><div class="hex">#F0EFF3</div></div></div>
  </div>
  <div class="demo">
    <span class="btn">Analysieren</span>
    <span class="soft">Einfügen</span>
    <span class="line"></span>
  </div>
</body>
</html>
