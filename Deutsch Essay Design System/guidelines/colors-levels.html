<!-- @dsCard group="Colors" viewport="700x210" name="CEFR levels — faded watercolor" subtitle="Rose · Blue · Lavender encode B1 · B2 · C1. Paint only, never UI fill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px 28px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .lvl{border-radius:14px;border:1px solid var(--line);background:var(--card);padding:16px 18px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .dot{width:14px;height:14px;border-radius:4px;flex:none}
  .lv{font-family:var(--font-serif);font-size:24px;font-weight:600;color:var(--ink)}
  .nm{font-size:11px;color:var(--muted);font-weight:600;margin-left:auto}
  .bars{display:flex;flex-direction:column;gap:7px}
  .bar{height:18px;border-radius:5px}
  .hex{font-size:9.5px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:9px}
</style>
</head>
<body>
  <div class="grid">
    <div class="lvl">
      <div class="top"><span class="dot" style="background:var(--rose)"></span><span class="lv">B1</span><span class="nm">Rose</span></div>
      <div class="bars"><div class="bar" style="background:var(--rose)"></div><div class="bar" style="background:var(--rose-soft)"></div></div>
      <div class="hex">#C2868D · #F2E6E6</div>
    </div>
    <div class="lvl">
      <div class="top"><span class="dot" style="background:var(--blue)"></span><span class="lv">B2</span><span class="nm">Blue</span></div>
      <div class="bars"><div class="bar" style="background:var(--blue)"></div><div class="bar" style="background:var(--blue-soft)"></div></div>
      <div class="hex">#9DB2C9 · #E6ECF2</div>
    </div>
    <div class="lvl">
      <div class="top"><span class="dot" style="background:var(--lav)"></span><span class="lv">C1</span><span class="nm">Lavender</span></div>
      <div class="bars"><div class="bar" style="background:var(--lav)"></div><div class="bar" style="background:var(--lav-soft)"></div></div>
      <div class="hex">#A99BC0 · #ECE7F1</div>
    </div>
  </div>
</body>
</html>
