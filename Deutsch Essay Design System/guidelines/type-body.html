<!-- @dsCard group="Type" viewport="700x250" name="UI sans — Inter" subtitle="The quiet chrome: labels, nav, meta, glosses" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);padding:28px 32px}
  .row{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--line-soft);padding:9px 0}
  .row:last-child{border-bottom:0}
  .spec{font-size:var(--text-micro);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);width:120px;flex:none;font-weight:600}
  .s{color:var(--ink)}
</style>
</head>
<body>
  <div class="row"><span class="spec">Body · 14.5 / 400</span><span class="s" style="font-size:14.5px">Ihr thematischer Wortschatz für präzises Deutsch.</span></div>
  <div class="row"><span class="spec">Small · 13.5 / 500</span><span class="s" style="font-size:13.5px;font-weight:500;color:var(--ink-soft)">Suche nach Begriff oder Übersetzung</span></div>
  <div class="row"><span class="spec">Caption · 12</span><span class="s" style="font-size:12px;color:var(--ink-mute)">36 Wörter · Automatisch gespeichert</span></div>
  <div class="row"><span class="spec">Gloss · italic</span><span class="s" style="font-size:13px;font-style:italic;color:var(--ink-mute)">зависимость, влияние</span></div>
  <div class="row"><span class="spec">Tag · 11 / 600</span><span class="s" style="font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--ink-mute)">B1 · B2 · C1</span></div>
</body>
</html>
