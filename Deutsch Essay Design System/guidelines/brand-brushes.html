<!-- @dsCard group="Brand" viewport="700x300" name="Watercolor brushes — the signature motif" subtitle="One real painted stroke per level × word-type. Soft left, drawn-in on hover" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-cool);font-family:var(--font-sans);padding:18px 26px}
  .word{position:relative;display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:11px 14px 11px 22px;border-radius:14px;min-height:54px;overflow:hidden}
  .word .wash{position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:108%;height:160%;z-index:0;pointer-events:none;
    background:var(--brush) no-repeat left center;background-size:62% 118%;opacity:.62;
    -webkit-mask:linear-gradient(90deg,#000 0,#000 30%,rgba(0,0,0,.4) 48%,transparent 64%);
            mask:linear-gradient(90deg,#000 0,#000 30%,rgba(0,0,0,.4) 48%,transparent 64%)}
  .word>*{position:relative;z-index:1}
  .w-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px}
  .de{font-family:var(--font-serif);font-size:24px;font-weight:500;color:var(--ink);line-height:1.1;white-space:nowrap}
  .de .art{font-weight:500}
  .ru{font-family:var(--font-serif);font-style:italic;font-size:15px;color:var(--ink-soft)}
  .tag{font-size:10.5px;font-weight:600;letter-spacing:.5px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:3px 8px;background:var(--card)}
</style>
</head>
<body>
  <div class="word" style="--brush:url('../assets/brushes/B1_Die_Powdery-Pink_BG-Wash.png')"><span class="wash"></span><div class="w-body"><div class="de"><span class="art">die</span> Abhängigkeit</div><div class="ru">зависимость</div></div><span class="tag">B1 · die</span></div>
  <div class="word" style="--brush:url('../assets/brushes/B2_Der_Deep-Blue_BG-Wash.png')"><span class="wash"></span><div class="w-body"><div class="de"><span class="art">der</span> Algorithmus</div><div class="ru">алгоритм</div></div><span class="tag">B2 · der</span></div>
  <div class="word" style="--brush:url('../assets/brushes/B2_Verbs_Terracotta_BG-Wash.png')"><span class="wash"></span><div class="w-body"><div class="de">analysieren</div><div class="ru">анализировать</div></div><span class="tag">B2 · Verb</span></div>
  <div class="word" style="--brush:url('../assets/brushes/C1_Adjectives_Plum_BG-Wash.png')"><span class="wash"></span><div class="w-body"><div class="de">nachhaltig</div><div class="ru">устойчивый</div></div><span class="tag">C1 · Adj</span></div>
</body>
</html>
