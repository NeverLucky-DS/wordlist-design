<!-- @dsCard group="Type" viewport="700x230" name="Eyebrows & tracked labels" subtitle="Uppercase Inter, wide tracking — the structural captions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);padding:30px 32px;display:flex;flex-direction:column;gap:22px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);font-weight:700}
  .lab-rose{display:flex;align-items:center;justify-content:center;gap:14px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .lab-rose::before,.lab-rose::after{content:"";height:1px;width:40px;background:var(--hair)}
  .rail{font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .note{font-size:11px;color:var(--muted-2);margin-top:-12px}
</style>
</head>
<body>
  <div><div class="eyebrow">Technologie</div><div class="note">eyebrow · accent · .22em</div></div>
  <div><div class="label">Klischees · Argument Eins</div><div class="note">tool label · ink-mute · .16em</div></div>
  <div><div class="lab-rose">Bedeutung</div><div class="note">centred section label, flanked by hairlines</div></div>
  <div><div class="rail">Verteilung nach Niveau</div><div class="note">rail micro-label · 2.5px tracking</div></div>
</body>
</html>
