<!-- @dsCard group="Colors" viewport="700x180" name="Ink ramp — warm graphite" subtitle="Never pure black; five warm greys carry all text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px 28px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  .chip{height:50px;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:22px;font-weight:600}
  .meta{padding:8px 10px;background:var(--card)}
  .nm{font-size:11px;font-weight:600;color:var(--ink)}
  .hex{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--ink);color:#fff">Aa</div><div class="meta"><div class="nm">ink</div><div class="hex">#2A2420</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-soft);color:#fff">Aa</div><div class="meta"><div class="nm">ink-soft</div><div class="hex">#5B534A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-mute);color:#fff">Aa</div><div class="meta"><div class="nm">ink-mute</div><div class="hex">#8C8377</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--muted);color:#fff">Aa</div><div class="meta"><div class="nm">muted</div><div class="hex">#A8A096</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--muted-2);color:var(--ink)">Aa</div><div class="meta"><div class="nm">muted-2</div><div class="hex">#C8C1B6</div></div></div>
  </div>
</body>
</html>
