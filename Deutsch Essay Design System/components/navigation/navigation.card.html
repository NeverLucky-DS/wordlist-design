<!-- @dsCard group="Components" viewport="700x250" name="Navigation" subtitle="Shared top bar · category filter chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans)}
  .wrap{padding:22px 26px}
  .cap{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 26px 12px}
  .row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;padding:0 26px}
  .de-navitem:hover{color:var(--ink)!important;background:var(--cream);border-color:var(--line)!important}
  .de-chip:hover:not(.is-active){transform:translateY(-2px);border-color:var(--muted-2)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TopBar, Chip } = window.DeutschEssayDesignSystem_3bc91c;
  function Demo(){
    const [cat,setCat] = React.useState('Alle');
    const cats=['Alle · 89','Technologie','Gesellschaft','Wissenschaft','Umwelt'];
    return (
      <div>
        <TopBar items={[
          {label:'Dashboard'},
          {label:'Schreiben'},
          {label:'Lernen', dropdown:true, active:true},
          {label:'Verlauf'},
          {label:'Pipeline'},
        ]} />
        <div className="wrap">
          <div className="cap">Category filters · single-select</div>
          <div className="row">
            {cats.map(c=>(
              <Chip key={c} active={cat===c} onClick={()=>setCat(c)}>{c}</Chip>
            ))}
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
