<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:28px 30px}
  .cap{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:12px}
  .stack{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .de-search:focus-within{border-color:var(--accent-ln)!important;box-shadow:var(--focus-shadow)}
  .de-select:hover{border-color:var(--accent-ln)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { SearchField, Select } = window.DeutschEssayDesignSystem_3bc91c;
  function Demo(){
    const [q,setQ] = React.useState('');
    return (
      <div className="stack">
        <div>
          <div className="cap">Search · md</div>
          <SearchField value={q} onChange={e=>setQ(e.target.value)} placeholder="Suche nach Begriff oder Übersetzung (z. B. „Fortschritt“)" />
        </div>
        <div>
          <div className="cap">Pill selects</div>
          <div className="row">
            <Select label="THEMA" value="Technologie" />
            <Select label="FORM" value="argumentativ" />
            <Select value="Vorlage" open={true} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
