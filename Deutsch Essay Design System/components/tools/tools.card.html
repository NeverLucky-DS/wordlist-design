<!-- @dsCard group="Components" viewport="700x300" name="Tools & progress" subtitle="Right-rail tool panel · writing-goal progress" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px 28px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  .kli{position:relative;padding:12px 14px;border-radius:12px;border:1px solid var(--line-soft);background:var(--cream);margin-bottom:10px}
  .kli-de{font-size:14px;line-height:1.5;color:var(--ink)}
  .kli-de em{font-style:normal;color:var(--accent);font-weight:600}
  .kli-ru{font-size:12.5px;color:var(--ink-mute);margin-top:4px}
  .nav{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .pager{display:flex;align-items:center;gap:8px}
  .count{font-size:12px;color:var(--muted);font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ToolCard, ProgressBar, Card } = window.DeutschEssayDesignSystem_3bc91c;
  const Pager = () => (
    <div className="pager">
      <button className="nav">‹</button><span className="count">1 / 2</span><button className="nav">›</button>
    </div>
  );
  function Demo(){
    return (
      <div className="grid">
        <ToolCard title="KLISCHEES" accent="ARGUMENT EINS" action={<Pager/>}>
          <div className="kli"><div className="kli-de"><em>Ein wichtiges Argument dafür ist, dass …</em></div><div className="kli-ru">Важный аргумент в пользу этого — что …</div></div>
          <div className="kli"><div className="kli-de">Erstens lässt sich feststellen, dass …</div><div className="kli-ru">Во-первых, можно констатировать, что …</div></div>
        </ToolCard>
        <Card elevation="md">
          <ProgressBar value={83} max={250} label="Fortschritt" showCount />
          <div style={{height:'22px'}}></div>
          <ProgressBar value={128} max={214} label="Gelernt" showCount />
        </Card>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
