<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:28px 30px}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .row:last-child{margin-bottom:0}
  .cap{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;width:100%;margin-bottom:-4px}
  .de-btn:hover{transform:translateY(-2px)}
  .de-btn--secondary:hover{border-color:var(--accent-ln)!important}
  .de-iconbtn:hover{border-color:var(--accent-ln);color:var(--accent)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton } = window.DeutschEssayDesignSystem_3bc91c;
  const Sparkle = () => (<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z"/></svg>);
  const Plus = () => (<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>);
  const Sun = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>);
  const Folder = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>);

  function Demo(){
    return (
      <React.Fragment>
        <div className="row">
          <span className="cap">Variants · md</span>
          <Button variant="primary" icon={<Sparkle/>}>Analysieren</Button>
          <Button variant="secondary" icon={<Plus/>}>Neues Essay</Button>
          <Button variant="ghost">Abbrechen</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="cap">Large CTA · icon buttons</span>
          <Button variant="primary" size="lg" icon={<Sparkle/>}>Essay analysieren</Button>
          <IconButton label="Theme"><Sun/></IconButton>
          <IconButton label="Folder"><Folder/></IconButton>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
