<!DOCTYPE html>
<html lang="en">
<head>

<style>

  .stack{display:flex;flex-direction:column;gap:20px}

<body>
<div id="root"></div>

<script src="../../_ds_bundle.js"></script>
<script type="text/babel">

    return (
      <div className="stack">
        <div className="row" style={{alignItems:'stretch'}}>
          <Card elevation="md" style={{flex:1}}>

            <div className="serif" style={{fontSize:'40px',fontWeight:600,color:'var(--ink)'}}>B1</div>
          </Card>
        </div>
        <div>
          <div className="cap">Level tags · quiet & tinted</div>
          <div className="row">
            <LevelTag level="B1" /><LevelTag level="B2" /><LevelTag level="C1" />

            <LevelTag level="B1" tinted /><LevelTag level="B2" tinted /><LevelTag level="C1" tinted />

    );

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
